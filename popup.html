<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Extension Popup</title>

  <!-- LOCAL Bootstrap CSS -->
  <link href="css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      width: 360px;
      padding: 15px;
      background: #f8f9fa;
    }
    .list-group-item {
      border-radius: 8px;
      margin-bottom: 8px;
    }
  </style>
</head>

<body>
  <h5 class="mb-3">Manage Features</h5>

  <ul class="list-group">

    <li class="list-group-item d-flex justify-content-between align-items-center">
      Hide shorts
      <div class="form-check form-switch">
        <input class="form-check-input settings-input" type="checkbox" id="toggle1">
      </div>
    </li>

    <li class="list-group-item d-flex justify-content-between align-items-center">
      Hide video end recommendations
      <div class="form-check form-switch">
        <input class="form-check-input settings-input" type="checkbox" id="toggle2">
      </div>
    </li>

    <li class="list-group-item d-flex justify-content-between align-items-center">
      Hide sidebar recommendations
      <div class="form-check form-switch">
        <input class="form-check-input settings-input" type="checkbox" id="toggle3">
      </div>
    </li>

    <li class="list-group-item d-flex justify-content-between align-items-center">
      Hide comments
      <div class="form-check form-switch">
        <input class="form-check-input settings-input" type="checkbox" id="toggle4">
      </div>
    </li>

    <li class="list-group-item d-flex justify-content-between align-items-center">
      Disable Auto-play videos
      <div class="form-check form-switch">
        <input class="form-check-input settings-input" type="checkbox" id="toggle5">
      </div>
    </li>

  </ul>

  <!-- LOCAL Bootstrap JS -->
  <script src="js/bootstrap.bundle.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
