<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Extension Popup</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      width: 390px; /* Reasonable extension popup width */
      padding: 15px;
      font-family: Arial, sans-serif;
      background: #f8f9fa;
    }

    h3 {
      font-size: 1.2rem;
      margin-bottom: 15px;
    }

    .list-group-item {
      border-radius: 8px;
      margin-bottom: 8px;
    }
  </style>
</head>
<body >
    <h3>Manage Features</h3>
    <ul class="list-group">
      <li class="list-group-item d-flex justify-content-between align-items-center">
        Hide shorts
        <div class="form-check form-switch">
          <input class="settings-input" type="checkbox" id="toggle1">
        </div>
      </li>
      <li class="list-group-item d-flex justify-content-between align-items-center">
        Hide video end recommendations
        <div class="form-check form-switch">
          <input class="settings-input" type="checkbox" id="toggle2">
        </div>
      </li>
      <li class="list-group-item d-flex justify-content-between align-items-center">
        Hide sidebar recommendations
        <div class="form-check form-switch">
          <input class="settings-input" type="checkbox" id="toggle3">
        </div>
      </li>
      <li class="list-group-item d-flex justify-content-between align-items-center">
        Hide comments
        <div class="form-check form-switch">
          <input class="settings-input" type="checkbox" id="toggle4">
        </div>
      </li>
    </ul>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
